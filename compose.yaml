services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: flowlynk
      POSTGRES_USER: flowlynk
      POSTGRES_PASSWORD: flowlynk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  pgdata: