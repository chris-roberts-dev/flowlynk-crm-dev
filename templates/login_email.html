<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FlowLynk — Find your organization</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-light">
    <main class="container py-5" style="max-width: 720px;">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h1 class="h4 mb-1">Sign in</h1>
          <p class="text-secondary mb-4">Enter your email to find your organization.</p>

          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-{{ message.tags }} mb-3" role="alert">{{ message }}</div>
            {% endfor %}
          {% endif %}

          <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
              {{ form.email.label_tag }}
              {{ form.email }}
              {% if form.email.errors %}
                <div class="text-danger small mt-1">{{ form.email.errors|striptags }}</div>
              {% endif %}
            </div>
            <button class="btn btn-primary" type="submit">Continue</button>
            <a class="btn btn-link" href="/">Back</a>
          </form>
        </div>
      </div>
    </main>
  </body>
</html>
